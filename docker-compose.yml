version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      TZ: Asia/Shanghai
      POSTGRES_DB: odi_saas
      POSTGRES_USER: odi_user
      POSTGRES_PASSWORD: odi_pass_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odi_user -d odi_saas"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
      # 跨平台构建: docker buildx build --platform linux/amd64
    ports:
      - "8000:8000"
    # NOTE: 生产部署时使用 --env-file 参数注入环境变量，不要将 .env 文件打包进镜像
    # 本地开发使用 .env.development，CI/CD 生产请使用 .env.production 或 --env-file
    environment:
      TZ: Asia/Shanghai
      DATABASE_URL: postgresql+asyncpg://odi_user:odi_pass_dev@db:5432/odi_saas
      DATABASE_SYNC_URL: postgresql://odi_user:odi_pass_dev@db:5432/odi_saas
      APP_ENV: ${APP_ENV:-development}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      TZ: Asia/Shanghai
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
